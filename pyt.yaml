pipeline:
  name: py1
  identifier: py1
  projectIdentifier: default_project
  orgIdentifier: default
  stages:
    - stage:
        name: Execute Python
        identifier: Execute_Python
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: Cloud
            spec:
              type: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Install Dependencies and Test
                  identifier: install_and_test
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.10-slim
                    shell: Bash
                    command: |-
                      echo "Installing testing tools..."
                      pip install pytest
                      
                      echo "Creating inline test file..."
                      cat << 'EOF' > test_app.py
                      def add_numbers(a, b): 
                          return a + b

                      def test_add_numbers(): 
                          assert add_numbers(2, 3) == 5
                          assert add_numbers(-1, 1) == 0
                      EOF
                      
                      echo "Running test suite and creating JUnit XML report..."
                      pytest test_app.py --junitxml=results.xml
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - "results.xml"
              - step:
                  type: Run
                  name: Run Production Script
                  identifier: run_script
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.10-slim
                    shell: Bash
                    command: |-
                      echo "Creating inline application file..."
                      cat << 'EOF' > app.py
                      def add_numbers(a, b):
                          return a + b

                      if __name__ == "__main__":
                          result = add_numbers(5, 7)
                          print(f"Success! The calculation result is: {result}")
                      EOF
                      
                      echo "Executing main script..."
                      python app.py
