pipeline:
  name: py1
  identifier: py1
  projectIdentifier: default_project
  orgIdentifier: default
  stages:
    - stage:
        name: Execute Python Local
        identifier: Execute_Python_Local
        type: CI
        spec:
          cloneCodebase: false
          infrastructure:
            type: Kubernetes
            spec:
              connectorRef: local_laptop_runner
              namespace: harness-delegate-ng
          execution:
            steps:
              - step:
                  type: Run
                  name: Install Dependencies and Test
                  identifier: install_and_test
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.10-slim
                    shell: Bash
                    command: |-
                      echo "Installing testing tools..."
                      pip install pytest
                      
                      echo "Creating inline test file..."
                      cat << 'EOF' > test_app.py
                      def add_numbers(a, b): return a + b
                      def test_add_numbers(): assert add_numbers(2, 3) == 5
                      EOF
                      
                      echo "Running test suite..."
                      pytest test_app.py --junitxml=results.xml
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - "results.xml"
              - step:
                  type: Run
                  name: Run Production Script
                  identifier: run_script
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.10-slim
                    shell: Bash
                    command: |-
                      echo "Creating inline application file..."
                      cat << 'EOF' > app.py
                      print("Success! The calculation result is running locally: 12")
                      EOF
                      
                      echo "Executing main script..."
                      python app.py
